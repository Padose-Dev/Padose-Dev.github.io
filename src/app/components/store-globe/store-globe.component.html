<section class="store-showcase section">
  <div class="container showcase-header">
    <h2 class="section-title">Discover {{stores.length}}+ Local Stores</h2>
    <p class="section-subtitle">Real businesses from your neighborhood, already on Padose. Tap any store to explore.</p>
  </div>

  <!-- Loading -->
  <div class="showcase-loading" *ngIf="isLoading">
    <div class="spinner"></div>
  </div>

  <!-- Marquee Wall -->
  <div
    class="marquee-wall"
    *ngIf="!isLoading && rows.length > 0"
    [class.paused]="isPaused"
    (mouseenter)="onMouseEnter()"
    (mouseleave)="onMouseLeave()"
  >
    <div
      *ngFor="let row of rows; let i = index"
      class="marquee-row"
      [class.reverse]="isReversed(i)"
    >
      <div class="marquee-track">
        <a
          *ngFor="let store of row; let j = index; trackBy: trackBySlug"
          class="store-card"
          [href]="getStoreUrl(store)"
          target="_blank"
          rel="noopener"
        >
          <img
            [src]="getImageUrl(store)"
            [alt]="store.name"
            loading="lazy"
            class="store-img"
            (error)="$any($event.target).style.display='none'"
          />
          <div class="store-info">
            <span class="store-name">{{ store.name }}</span>
            <span class="store-community" *ngIf="store.community">{{ store.community }}</span>
          </div>
        </a>
      </div>
    </div>
  </div>

  <!-- Gradient fades on edges -->
  <div class="edge-fade left" *ngIf="!isLoading && rows.length > 0"></div>
  <div class="edge-fade right" *ngIf="!isLoading && rows.length > 0"></div>

  <!-- CTA -->
  <div class="container showcase-cta" *ngIf="!isLoading && stores.length > 0">
    <a href="https://play.google.com/store/apps/details?id=com.padose.app.buyer" target="_blank" rel="noopener" class="btn-explore">
      Download App to Explore All Stores
    </a>
  </div>
</section>
